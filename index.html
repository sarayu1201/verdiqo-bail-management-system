<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Verdiqo is a smart decision support and automated verification platform for bail adjudication in Indian courts. Designed for Quantex Intelligence Systems.">
    <meta name="theme-color" content="#0a1628">
    <title>Verdiqo - Smart Bail Verification & Decision Support Engine</title>
    
    <!-- Premium Google Fonts Configuration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">
    
    <!-- Link to our design system stylesheet -->
    <link rel="stylesheet" href="./src/index.css?v=2.0">
    
    <!-- SEO and Institutional Authority tags -->
    <meta property="og:title" content="Verdiqo - Legal Bail Decision Engine">
    <meta property="og:description" content="Decentralized API integration, biometric security validation, and automated risk scoring for Indian Court Registries.">
    <meta property="og:type" content="website">

    <!-- PWA Integration -->
    <link rel="manifest" href="./manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</head>
<body class="light-theme">
    
    <!-- Root Mounting Point for the entire Application -->
    <div id="app-root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f7f3ec; font-family: 'Playfair Display', serif; color: #0a1628;">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="#0a1628" stroke-width="2" style="margin-bottom: 24px; animation: pulse 1.5s infinite;">
                <path d="M12 2v20M5 7h14M5 7L3 13h4L5 7zm14 0l-2 6h4l-2-6zM12 22h6M12 22H6"/>
            </svg>
            <h2 style="font-size: 24px; font-weight: 700; letter-spacing: 1px;">LOADING VERDIQO ADJUDICATION SECURITY SUITE...</h2>
            <p style="font-size: 12px; font-family: monospace; color: #666; margin-top: 10px; letter-spacing: 2px;">SECURE CRYPTOGRAPHIC HANDSHAKE IN PROGRESS</p>
        </div>
    </div>

    <!-- Script Orchestration - Loaded as an ES6 Module for zero-compilation immediate runnability -->
    <script type="module" src="./src/app.js"></script>
    
    <style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</body>
</html>
